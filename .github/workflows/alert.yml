name: BTC Alert — Telegram

on:
  schedule:
    # a cada 4h: 00:30, 04:30, 08:30, 12:30, 16:30, 20:30 UTC
    - cron: "30 */4 * * *"
  workflow_dispatch: {}   # disparo manual para testar

permissions:
  contents: write

concurrency:
  group: btc-alert
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verificar condicoes e alertar
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          FNG_THRESHOLD:      ${{ vars.FNG_THRESHOLD || '9' }}
          COOLDOWN_HOURS:     ${{ vars.COOLDOWN_HOURS || '20' }}
        run: python scripts/telegram_alert.py

      - name: Salvar estado de alerta
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain docs/data/alert_state.json)" ]]; then
            git add docs/data/alert_state.json
            git commit -m "alert: state $(date -u +%F\ %H:%M) UTC"
            git push
          fi
